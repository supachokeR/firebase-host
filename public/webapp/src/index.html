<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App - ยินดีต้อนรับ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #f8fafc;
            --accent-color: #3b82f6;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at top right, #e2e8f0 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #e2e8f0 0%, transparent 40%);
        }

        .card {
            background-color: var(--white);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            max-width: 450px;
            width: 90%;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background-color: #dbeafe;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
        }

        .icon {
            width: 40px;
            height: 40px;
            color: var(--primary-color);
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 1rem;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: var(--white);
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }

        .btn:hover {
            background-color: var(--accent-color);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.23);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
        </div>
        <h1>ยินดีต้อนรับเข้าสู่ระบบ</h1>
        <p>หน้าเว็บนี้ได้รับการพัฒนาด้วย Google Apps Script พร้อมการออกแบบที่เน้นความเรียบง่ายและใช้งานสะดวก</p>
        <a href="javascript:void(0)" class="btn">เริ่มต้นใช้งาน</a>
        <div class="footer">
            &copy; 2024 My Web Application
        </div>
    </div>
</body>
</html>
