<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern CRUD Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-[Inter] text-gray-900">

    <div class="min-h-screen flex flex-col">
        <!-- Navigation -->
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-2">
                        <div class="bg-indigo-600 p-2 rounded-lg">
                            <i class="fas fa-database text-white text-xl"></i>
                        </div>
                        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">
                            CloudManager
                        </h1>
                    </div>
                    <div class="hidden md:flex items-center space-x-4">
                        <span id="connectionStatus" class="flex items-center text-sm text-green-500 font-medium">
                            <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                            Online
                        </span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <!-- Header Section -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Customer Records</h2>
                    <p class="text-gray-500 text-sm">Manage your customer database in real-time</p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="addBtn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-100 active:scale-95">
                        <i class="fas fa-plus"></i>
                        <span>Add New Entry</span>
                    </button>
                </div>
            </div>

            <!-- Stats & Search -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="md:col-span-3 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-search text-gray-400"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="Search by name, email, or role..." 
                        class="block w-full pl-10 pr-3 py-3 bg-white border border-gray-200 rounded-xl leading-5 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all shadow-sm">
                </div>
                <div class="bg-white p-3 border border-gray-200 rounded-xl flex items-center justify-between shadow-sm">
                    <span class="text-sm text-gray-500 font-medium">Total:</span>
                    <span id="totalCount" class="text-lg font-bold text-indigo-600">0</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="relative">
                <!-- Loading Overlay -->
                <div id="loadingOverlay" class="absolute inset-0 bg-gray-50/50 backdrop-blur-sm z-10 flex items-center justify-center rounded-2xl hidden">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                        <p class="text-indigo-600 font-medium animate-pulse">Synchronizing...</p>
                    </div>
                </div>

                <!-- Desktop Table View -->
                <div class="hidden md:block bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Customer</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Contact</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Role</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="desktopTableBody" class="bg-white divide-y divide-gray-100">
                            <!-- JS will inject rows here -->
                        </tbody>
                    </table>
                </div>

                <!-- Mobile Card View -->
                <div id="mobileCardContainer" class="grid grid-cols-1 gap-4 md:hidden">
                    <!-- JS will inject cards here -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="hidden flex-col items-center justify-center py-20 bg-white border border-dashed border-gray-300 rounded-2xl">
                    <div class="bg-gray-50 p-4 rounded-full mb-4">
                        <i class="fas fa-folder-open text-gray-300 text-4xl"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-700">No records found</h3>
                    <p class="text-gray-400 text-sm">Try adjusting your search or add a new entry.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Entry Modal -->
    <div id="entryModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div id="modalOverlay" class="fixed inset-0 transition-opacity bg-gray-500/75 backdrop-blur-sm"></div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div class="inline-block overflow-hidden text-left align-bottom transition-all transform bg-white rounded-2xl shadow-2xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                    <h3 id="modalTitle" class="text-lg font-bold text-gray-800">Add New Customer</h3>
                    <button type="button" class="closeModal text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form id="entryForm" class="p-6">
                    <input type="hidden" id="recordId">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                            <input type="text" id="name" required placeholder="John Doe"
                                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                                <input type="email" id="email" required placeholder="john@example.com"
                                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                                <input type="tel" id="phone" required placeholder="08x-xxx-xxxx"
                                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Role</label>
                                <select id="role" required
                                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all appearance-none cursor-pointer">
                                    <option value="Customer">Customer</option>
                                    <option value="Partner">Partner</option>
                                    <option value="Supplier">Supplier</option>
                                    <option value="Lead">Lead</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
                                <select id="status" required
                                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all appearance-none cursor-pointer">
                                    <option value="Active">Active</option>
                                    <option value="Pending">Pending</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 flex gap-3">
                        <button type="button" class="closeModal flex-1 px-4 py-2.5 border border-gray-200 text-gray-700 font-semibold rounded-xl hover:bg-gray-50 transition-all">
                            Cancel
                        </button>
                        <button type="submit" id="saveBtn" class="flex-1 px-4 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i>
                            <span id="saveBtnText">Save Entry</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
</body>
</html>
